<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Profile Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #16161f;
    --border: rgba(255,255,255,0.07);
    --border-bright: rgba(255,255,255,0.14);
    --text: #e8e8f0;
    --muted: #6b6b80;
    --accent1: #7c6af7;
    --accent2: #2dd4bf;
    --accent3: #f472b6;
    --accent4: #fb923c;
    --green: #4ade80;
    --yellow: #fbbf24;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.6;
  }

  header {
    padding: 2rem 2rem 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .username-input-wrap {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  input#username {
    background: var(--bg3);
    border: 1px solid var(--border-bright);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 0.45rem 0.85rem;
    border-radius: 6px;
    outline: none;
    width: 180px;
    transition: border-color 0.2s;
  }
  input#username:focus { border-color: var(--accent1); }
  input#username::placeholder { color: var(--muted); }

  button#load-btn {
    background: var(--accent1);
    color: white;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 0.45rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  button#load-btn:hover { opacity: 0.85; }
  button#load-btn:active { transform: scale(0.97); }
  button#load-btn:disabled { opacity: 0.4; cursor: default; }

  .dashboard {
    padding: 1.5rem 2rem 3rem;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 1rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── CARD BASE ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.4rem 1.6rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s, transform 0.25s;
    animation: fadeUp 0.5s ease backwards;
  }
  .card:hover {
    border-color: var(--border-bright);
    transform: translateY(-2px);
  }
  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(12px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* stagger children */
  .card:nth-child(1)  { animation-delay: 0.05s; }
  .card:nth-child(2)  { animation-delay: 0.10s; }
  .card:nth-child(3)  { animation-delay: 0.15s; }
  .card:nth-child(4)  { animation-delay: 0.20s; }
  .card:nth-child(5)  { animation-delay: 0.25s; }
  .card:nth-child(6)  { animation-delay: 0.30s; }
  .card:nth-child(7)  { animation-delay: 0.35s; }
  .card:nth-child(8)  { animation-delay: 0.40s; }
  .card:nth-child(9)  { animation-delay: 0.45s; }
  .card:nth-child(10) { animation-delay: 0.50s; }

  /* ── GRID SPANS ── */
  .span-3  { grid-column: span 3; }
  .span-4  { grid-column: span 4; }
  .span-5  { grid-column: span 5; }
  .span-6  { grid-column: span 6; }
  .span-7  { grid-column: span 7; }
  .span-8  { grid-column: span 8; }
  .span-12 { grid-column: span 12; }

  /* ── CARD LABEL ── */
  .card-label {
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .card-label .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
    display: inline-block;
  }

  /* ── PROFILE CARD ── */
  .profile-card {
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }
  .avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px solid var(--border-bright);
    object-fit: cover;
    flex-shrink: 0;
  }
  .avatar-placeholder {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--bg3);
    border: 2px solid var(--border);
    flex-shrink: 0;
  }
  .profile-info .name {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }
  .profile-info .handle {
    font-size: 0.75rem;
    color: var(--accent1);
    margin-top: 0.15rem;
  }
  .profile-info .bio {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.4rem;
    line-height: 1.5;
    max-width: 280px;
  }

  /* ── STAT ── */
  .stat-val {
    font-family: 'Syne', sans-serif;
    font-size: 2.4rem;
    font-weight: 800;
    line-height: 1;
    color: var(--text);
  }
  .stat-sub {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.3rem;
    letter-spacing: 0.05em;
  }

  /* ── REPO LIST ── */
  .repo-item {
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.5rem;
  }
  .repo-item:last-child { border-bottom: none; }
  .repo-name {
    font-size: 0.78rem;
    color: var(--accent2);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
  }
  .repo-desc {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.15rem;
    line-height: 1.4;
  }
  .repo-stars {
    font-size: 0.65rem;
    color: var(--yellow);
    white-space: nowrap;
    margin-top: 0.1rem;
  }
  .lang-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }

  /* ── COMMIT CARD ── */
  .commit-item {
    padding: 0.55rem 0;
    border-bottom: 1px solid var(--border);
  }
  .commit-item:last-child { border-bottom: none; }
  .commit-sha {
    font-size: 0.62rem;
    color: var(--accent3);
    font-weight: 500;
  }
  .commit-msg {
    font-size: 0.73rem;
    color: var(--text);
    margin-top: 0.1rem;
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .commit-meta {
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 0.1rem;
  }

  /* ── EVENTS ── */
  .event-item {
    display: flex;
    gap: 0.7rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .event-item:last-child { border-bottom: none; }
  .event-icon {
    font-size: 0.9rem;
    flex-shrink: 0;
    margin-top: 1px;
    width: 20px;
    text-align: center;
  }
  .event-text {
    font-size: 0.7rem;
    color: var(--text);
    line-height: 1.45;
  }
  .event-time {
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 0.1rem;
  }

  /* ── LANGUAGE BAR ── */
  .lang-bar-wrap { margin-top: 0.5rem; }
  .lang-bar-track {
    height: 6px;
    background: var(--bg3);
    border-radius: 99px;
    overflow: hidden;
    display: flex;
    gap: 2px;
    margin-bottom: 0.8rem;
  }
  .lang-seg {
    height: 100%;
    border-radius: 99px;
    transition: width 0.8s cubic-bezier(.16,1,.3,1);
  }
  .lang-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 1rem;
  }
  .lang-list-item {
    font-size: 0.65rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .lang-list-item strong { color: var(--text); font-weight: 500; }

  /* ── CONTRIBUTION HEATMAP ── */
  .heatmap {
    display: flex;
    gap: 3px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .heatmap-col { display: flex; flex-direction: column; gap: 3px; }
  .heatmap-cell {
    width: 10px; height: 10px;
    border-radius: 2px;
    background: var(--bg3);
    transition: background 0.3s;
  }
  .heatmap-cell.l1 { background: rgba(124,106,247,0.25); }
  .heatmap-cell.l2 { background: rgba(124,106,247,0.5); }
  .heatmap-cell.l3 { background: rgba(124,106,247,0.75); }
  .heatmap-cell.l4 { background: rgba(124,106,247,1); }

  /* ── RANDOM QUOTE CARD ── */
  .rand-event {
    font-size: 0.78rem;
    line-height: 1.7;
    color: var(--text);
  }
  .rand-event strong { color: var(--accent4); }
  .rand-event em { color: var(--muted); font-style: normal; font-size: 0.65rem; }

  /* ── GLOW accents ── */
  .card.glow-purple::before {
    content:''; position:absolute; top:-40px; left:-40px;
    width:140px; height:140px;
    background: radial-gradient(circle, rgba(124,106,247,0.18) 0%, transparent 70%);
    pointer-events:none;
  }
  .card.glow-teal::before {
    content:''; position:absolute; top:-40px; right:-40px;
    width:140px; height:140px;
    background: radial-gradient(circle, rgba(45,212,191,0.15) 0%, transparent 70%);
    pointer-events:none;
  }
  .card.glow-pink::before {
    content:''; position:absolute; bottom:-40px; left:-40px;
    width:140px; height:140px;
    background: radial-gradient(circle, rgba(244,114,182,0.15) 0%, transparent 70%);
    pointer-events:none;
  }

  /* ── SPINNER ── */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border-bright);
    border-top-color: var(--accent1);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── EMPTY / ERROR ── */
  .empty-state {
    grid-column: span 12;
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-size: 0.8rem;
  }
  .empty-state .big { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--border-bright); margin-bottom: 0.5rem; }

  /* ── TICKER ── */
  .ticker-wrap {
    width: 100%; overflow: hidden;
    border-top: 1px solid var(--border);
    padding-top: 0.6rem;
    margin-top: 0.6rem;
  }
  .ticker {
    display: flex;
    white-space: nowrap;
    animation: ticker 30s linear infinite;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .ticker span { margin-right: 3rem; }
  .ticker strong { color: var(--accent2); }
  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .span-3,.span-4,.span-5,.span-6,.span-7,.span-8 { grid-column: span 12; }
    header { flex-direction: column; align-items: flex-start; gap: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">◆ GH · Dashboard</div>
  <div class="username-input-wrap">
    <input id="username" type="text" placeholder="github username" value="torvalds" />
    <button id="load-btn">load</button>
  </div>
</header>

<div class="dashboard" id="dashboard">
  <div class="empty-state">
    <div class="big">◆</div>
    enter a github username and press load
  </div>
</div>

<script>
const LANG_COLORS = {
  JavaScript:'#f7df1e',TypeScript:'#3178c6',Python:'#3572A5',Go:'#00add8',
  Rust:'#dea584',C:'#555555','C++':'#f34b7d',Ruby:'#701516',Java:'#b07219',
  PHP:'#4F5D95',Swift:'#f05138',Kotlin:'#A97BFF',Shell:'#89e051',
  HTML:'#e34c26',CSS:'#563d7c',Vue:'#41b883',Svelte:'#ff3e00',
  Dart:'#00b4ab',Scala:'#c22d40',Elixir:'#6e4a7e',Haskell:'#5e5086',
  Lua:'#000080',Perl:'#0298c3',R:'#198CE7',MATLAB:'#e16737',
  Nix:'#7e7eff', Makefile:'#427819', Dockerfile:'#384d54',
};
function langColor(l){ return LANG_COLORS[l]||'#888'; }

function timeAgo(iso){
  const s = Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60) return s+'s ago';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.random()*i|0;[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function pick(arr,n){ return shuffle(arr).slice(0,n); }

function eventIcon(type){
  const m={PushEvent:'◈',CreateEvent:'✦',WatchEvent:'★',ForkEvent:'⑂',
    IssuesEvent:'◎',PullRequestEvent:'⇄',DeleteEvent:'✕',
    IssueCommentEvent:'◉',ReleaseEvent:'◆',PublicEvent:'◐'};
  return m[type]||'◇';
}

function eventDesc(e){
  const r = e.repo?.name||'';
  switch(e.type){
    case 'PushEvent': {
      const n=e.payload?.commits?.length||0;
      return `pushed <strong>${n} commit${n!==1?'s':''}</strong> to <strong>${r}</strong>`;
    }
    case 'CreateEvent': return `created ${e.payload?.ref_type||'ref'} <strong>${e.payload?.ref||r}</strong>`;
    case 'WatchEvent': return `starred <strong>${r}</strong>`;
    case 'ForkEvent': return `forked <strong>${r}</strong>`;
    case 'IssuesEvent': return `${e.payload?.action||'opened'} issue in <strong>${r}</strong>`;
    case 'PullRequestEvent': return `${e.payload?.action||'opened'} PR in <strong>${r}</strong>`;
    case 'IssueCommentEvent': return `commented on issue in <strong>${r}</strong>`;
    case 'ReleaseEvent': return `released <strong>${e.payload?.release?.tag_name||''}</strong> in <strong>${r}</strong>`;
    default: return `${e.type.replace('Event','')} on <strong>${r}</strong>`;
  }
}

async function fetchJSON(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function loadDashboard(){
  const username = document.getElementById('username').value.trim();
  if(!username) return;
  const btn = document.getElementById('load-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
  const dash = document.getElementById('dashboard');
  dash.innerHTML='<div class="empty-state"><span class="spinner"></span></div>';

  try {
    const base = 'https://api.github.com';
    const headers = {'Accept':'application/vnd.github+json'};

    const [user, repos, events] = await Promise.all([
      fetchJSON(`${base}/users/${username}`),
      fetchJSON(`${base}/users/${username}/repos?sort=updated&per_page=100`),
      fetchJSON(`${base}/users/${username}/events/public?per_page=100`)
    ]);

    // --- pick random repos ---
    const pickedRepos = pick(repos.filter(r=>!r.fork), Math.min(5, repos.length));
    const topRepos = [...repos].sort((a,b)=>b.stargazers_count-a.stargazers_count).slice(0,3);

    // --- language aggregation ---
    const langMap={};
    repos.forEach(r=>{ if(r.language) langMap[r.language]=(langMap[r.language]||0)+1; });
    const langs = Object.entries(langMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
    const totalL = langs.reduce((s,[,v])=>s+v,0)||1;

    // --- pick random commits from push events ---
    const pushEvents = events.filter(e=>e.type==='PushEvent'&&e.payload?.commits?.length);
    const allCommits = pushEvents.flatMap(e=>(e.payload.commits||[]).map(c=>({
      sha: c.sha?.slice(0,7)||'???????',
      msg: c.message?.split('\n')[0]||'',
      repo: e.repo?.name||'',
      time: e.created_at
    })));
    const pickedCommits = pick(allCommits, Math.min(6, allCommits.length));

    // --- random events ---
    const pickedEvents = pick(events, Math.min(8, events.length));

    // --- fake heatmap from event dates ---
    const heatData = buildHeatmap(events);

    // --- ticker content ---
    const tickerItems = [
      ...topRepos.map(r=>`★ ${r.stargazers_count} — ${r.name}`),
      ...langs.map(([l,n])=>`${l} · ${n} repos`),
      `${user.public_repos} repos`,
      `${user.followers} followers`,
      `${user.following} following`,
    ];

    // --- RENDER ---
    dash.innerHTML = '';

    // Card 1: Profile — span 4
    dash.innerHTML += cardProfile(user);

    // Card 2: Stats row — 3 mini cards
    dash.innerHTML += cardStat('repositories', user.public_repos, 'public repos', 'glow-teal', 'span-2');
    dash.innerHTML += cardStat('followers', user.followers, 'followers', '', 'span-2');
    dash.innerHTML += cardStat('following', user.following, 'following', 'glow-purple', 'span-2');
    dash.innerHTML += cardStat('gists', user.public_gists, 'public gists', '', 'span-2');

    // Card 3: Random repos — span 5
    dash.innerHTML += cardRepos(pickedRepos);

    // Card 4: Languages — span 4
    dash.innerHTML += cardLangs(langs, totalL);

    // Card 5: Random commits — span 5
    dash.innerHTML += cardCommits(pickedCommits, username);

    // Card 6: Heatmap — span 7
    dash.innerHTML += cardHeatmap(heatData);

    // Card 7: Recent events — span 6
    dash.innerHTML += cardEvents(pickedEvents);

    // Card 8: Top starred — span 6
    dash.innerHTML += cardTopRepos(topRepos);

    // Card 9: Random event highlight — span 4
    if(pickedEvents[0]) dash.innerHTML += cardRandEvent(pickedEvents[0]);

    // Card 10: Ticker full width
    dash.innerHTML += cardTicker(tickerItems);

  } catch(err){
    dash.innerHTML = `<div class="empty-state"><div class="big">✕</div>${err.message}</div>`;
  }

  btn.disabled=false; btn.textContent='load';
}

function buildHeatmap(events){
  const counts={};
  events.forEach(e=>{
    const d=e.created_at?.slice(0,10);
    if(d) counts[d]=(counts[d]||0)+1;
  });
  // build 26 weeks × 7 days grid
  const weeks=[];
  const now=new Date();
  for(let w=25;w>=0;w--){
    const col=[];
    for(let d=6;d>=0;d--){
      const date=new Date(now);
      date.setDate(date.getDate()-(w*7+d));
      const key=date.toISOString().slice(0,10);
      const cnt=counts[key]||0;
      col.push(cnt);
    }
    weeks.push(col);
  }
  return weeks;
}

function levelClass(n){
  if(n===0) return '';
  if(n<=1) return 'l1';
  if(n<=3) return 'l2';
  if(n<=6) return 'l3';
  return 'l4';
}

function cardProfile(u){
  return `<div class="card span-4 glow-purple">
    <div class="card-label"><span class="dot"></span>profile</div>
    <div class="profile-card">
      <img class="avatar" src="${u.avatar_url}" alt="avatar" onerror="this.style.display='none'">
      <div class="profile-info">
        <div class="name">${u.name||u.login}</div>
        <div class="handle">@${u.login}</div>
        ${u.bio?`<div class="bio">${u.bio.slice(0,120)}</div>`:''}
        ${u.location?`<div class="bio" style="margin-top:.3rem;color:var(--accent2)">◎ ${u.location}</div>`:''}
        ${u.blog?`<div class="bio" style="margin-top:.2rem"><a href="${u.blog}" style="color:var(--accent1);text-decoration:none" target="_blank">↗ ${u.blog.replace(/https?:\/\//,'').slice(0,30)}</a></div>`:''}
      </div>
    </div>
  </div>`;
}

function cardStat(label,val,sub,glow,span){
  return `<div class="card ${span} ${glow}">
    <div class="card-label"><span class="dot"></span>${label}</div>
    <div class="stat-val">${val??'—'}</div>
    <div class="stat-sub">${sub}</div>
  </div>`;
}

function cardRepos(repos){
  const rows = repos.map(r=>`
    <div class="repo-item">
      <div style="min-width:0">
        <div class="repo-name">${r.name}</div>
        ${r.description?`<div class="repo-desc">${r.description.slice(0,80)}</div>`:''}
        <div class="repo-stars">
          ${r.language?`<span class="lang-dot" style="background:${langColor(r.language)}"></span>${r.language} · `:''}
          ★ ${r.stargazers_count}
        </div>
      </div>
    </div>`).join('');
  return `<div class="card span-5">
    <div class="card-label"><span class="dot"></span>random repos</div>
    ${rows}
  </div>`;
}

function cardLangs(langs,total){
  const segs = langs.map(([l,n])=>{
    const pct=((n/total)*100).toFixed(1);
    return `<div class="lang-seg" style="width:${pct}%;background:${langColor(l)}"></div>`;
  }).join('');
  const list = langs.map(([l,n])=>{
    const pct=((n/total)*100).toFixed(1);
    return `<div class="lang-list-item"><span class="lang-dot" style="background:${langColor(l)}"></span><strong>${l}</strong>&nbsp;${pct}%</div>`;
  }).join('');
  return `<div class="card span-4 glow-teal">
    <div class="card-label"><span class="dot"></span>languages</div>
    <div class="lang-bar-wrap">
      <div class="lang-bar-track">${segs}</div>
      <div class="lang-list">${list}</div>
    </div>
  </div>`;
}

function cardCommits(commits,user){
  if(!commits.length) return `<div class="card span-5"><div class="card-label"><span class="dot"></span>random commits</div><div style="color:var(--muted);font-size:.7rem;margin-top:.5rem">no recent commits found</div></div>`;
  const rows = commits.map(c=>`
    <div class="commit-item">
      <span class="commit-sha">${c.sha}</span>
      <div class="commit-msg">${c.msg}</div>
      <div class="commit-meta">${c.repo} · ${timeAgo(c.time)}</div>
    </div>`).join('');
  return `<div class="card span-5 glow-pink">
    <div class="card-label"><span class="dot"></span>random commits</div>
    ${rows}
  </div>`;
}

function cardHeatmap(weeks){
  const cols = weeks.map(col=>{
    const cells = col.map(n=>`<div class="heatmap-cell ${levelClass(n)}"></div>`).join('');
    return `<div class="heatmap-col">${cells}</div>`;
  }).join('');
  return `<div class="card span-7">
    <div class="card-label"><span class="dot"></span>activity heatmap (26w)</div>
    <div class="heatmap">${cols}</div>
  </div>`;
}

function cardEvents(events){
  const rows = events.map(e=>`
    <div class="event-item">
      <div class="event-icon" style="color:var(--accent1)">${eventIcon(e.type)}</div>
      <div>
        <div class="event-text">${eventDesc(e)}</div>
        <div class="event-time">${timeAgo(e.created_at)}</div>
      </div>
    </div>`).join('');
  return `<div class="card span-6">
    <div class="card-label"><span class="dot"></span>recent events</div>
    ${rows}
  </div>`;
}

function cardTopRepos(repos){
  const rows = repos.map((r,i)=>`
    <div class="repo-item">
      <div style="display:flex;align-items:center;gap:.5rem;min-width:0">
        <span style="font-family:'Syne',sans-serif;font-weight:800;color:var(--border-bright);font-size:.75rem;flex-shrink:0">#${i+1}</span>
        <div style="min-width:0">
          <div class="repo-name">${r.name}</div>
          ${r.description?`<div class="repo-desc">${r.description.slice(0,70)}</div>`:''}
        </div>
      </div>
      <div class="repo-stars" style="flex-shrink:0">★ ${r.stargazers_count}</div>
    </div>`).join('');
  return `<div class="card span-6">
    <div class="card-label"><span class="dot"></span>top starred</div>
    ${rows}
  </div>`;
}

function cardRandEvent(e){
  return `<div class="card span-4 glow-purple">
    <div class="card-label"><span class="dot"></span>latest event</div>
    <div class="rand-event" style="margin-top:.3rem">
      <span style="font-size:1.4rem;color:var(--accent1)">${eventIcon(e.type)}</span>
      <br><br>
      <span>${eventDesc(e)}</span><br>
      <em style="display:block;margin-top:.5rem">${timeAgo(e.created_at)}</em>
    </div>
  </div>`;
}

function cardTicker(items){
  const text = items.map(i=>`<span>◆ <strong>${i}</strong></span>`).join('');
  return `<div class="card span-12" style="padding:.9rem 1.6rem">
    <div class="ticker-wrap">
      <div class="ticker">${text.repeat(2)}</div>
    </div>
  </div>`;
}

document.getElementById('load-btn').addEventListener('click', loadDashboard);
document.getElementById('username').addEventListener('keydown', e=>{ if(e.key==='Enter') loadDashboard(); });

// auto-load on start
loadDashboard();
</script>
</body>
</html>
